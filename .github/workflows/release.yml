name: Build and release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Manual version tag (e.g. v0.1.0)"
        required: true
        default: "v0.0.0-dev"

env:
  GODOT_VERSION: "4.3"
  GODOT_RELEASE: "4.3-stable"

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          if (-not $tag) { $tag = "v0.0.0-dev" }
          $stripped = $tag.TrimStart('v')
          "tag=$tag"           | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "version=$stripped"  | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Tag: $tag  Version: $stripped"

      - name: Cache Godot editor + templates
        id: godot-cache
        uses: actions/cache@v4
        with:
          path: |
            godot
            ${{ env.LOCALAPPDATA }}\Godot\export_templates
          key: godot-${{ env.GODOT_RELEASE }}-windows

      - name: Download Godot editor
        if: steps.godot-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path godot | Out-Null
          $editor = "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_RELEASE }}/Godot_v${{ env.GODOT_RELEASE }}_win64.exe.zip"
          Invoke-WebRequest -Uri $editor -OutFile godot\godot.zip
          Expand-Archive -Path godot\godot.zip -DestinationPath godot -Force
          Remove-Item godot\godot.zip
          Get-ChildItem godot

      - name: Install export templates
        if: steps.godot-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_RELEASE }}/Godot_v${{ env.GODOT_RELEASE }}_export_templates.tpz"
          Invoke-WebRequest -Uri $url -OutFile templates.tpz
          $dest = "$env:APPDATA\Godot\export_templates\${{ env.GODOT_VERSION }}.stable"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          # .tpz is a zip; expand and move files out of the inner "templates" folder.
          Expand-Archive -Path templates.tpz -DestinationPath templates_extract -Force
          Get-ChildItem -Path templates_extract\templates -File | Move-Item -Destination $dest
          Remove-Item -Recurse -Force templates_extract, templates.tpz

      - name: Export Windows desktop build
        shell: pwsh
        run: |
          $godot = (Get-ChildItem godot\Godot_v*_win64.exe).FullName
          New-Item -ItemType Directory -Force -Path build | Out-Null
          # First import resources (required for export-release in headless mode)
          & $godot --headless --import 2>&1 | Out-Host
          # Then export
          & $godot --headless --export-release "Windows Desktop" "$PWD\build\game.exe" 2>&1 | Out-Host
          if (-not (Test-Path build\game.exe)) { throw "Export failed: build\game.exe not produced" }
          Get-Item build\game.exe | Format-List Name,Length

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Configure launcher
        shell: pwsh
        run: cmake -S launcher -B launcher\build -G "Visual Studio 17 2022" -A x64

      - name: Build launcher
        shell: pwsh
        run: cmake --build launcher\build --config Release

      - name: Write version.txt
        shell: pwsh
        run: |
          "${{ steps.ver.outputs.tag }}" | Out-File -FilePath build\version.txt -Encoding utf8 -NoNewline

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = (Get-Command ISCC -ErrorAction SilentlyContinue)
          if (-not $iscc) {
            $candidates = @(
              "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
              "C:\Program Files\Inno Setup 6\ISCC.exe"
            )
            $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
            if (-not $iscc) { throw "ISCC.exe not found" }
          } else {
            $iscc = $iscc.Source
          }
          Write-Host "Using $iscc"
          & $iscc "/DAppVersion=${{ steps.ver.outputs.version }}" installer\installer.iss
          Get-ChildItem installer\Output

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: leveldevil-${{ steps.ver.outputs.tag }}
          path: |
            build\game.exe
            launcher\build\Release\LevelDevilLauncher.exe
            installer\Output\*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Level Devil ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            build/game.exe
            launcher/build/Release/LevelDevilLauncher.exe
            installer/Output/LevelDevilSetup-${{ steps.ver.outputs.version }}.exe
